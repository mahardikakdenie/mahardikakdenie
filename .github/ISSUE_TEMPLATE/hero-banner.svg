<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Outfit:wght@400;700;900&amp;display=swap');
      
      .text-title { font-family: 'Outfit', sans-serif; font-size: 80px; font-weight: 900; fill: #ffffff; letter-spacing: -0.02em; line-height: 1; }
      .text-subtitle { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 400; fill: #94a3b8; }
      .text-badge { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; letter-spacing: 0.1em; }
      
      /* Code Syntax Highlighting Colors (One Dark Pro inspired) */
      .code-font { font-family: 'JetBrains Mono', monospace; font-size: 17px; }
      .kw { fill: #c678dd; } /* Keyword - Purple */
      .var { fill: #e5c07b; } /* Variable - Yellow */
      .prop { fill: #61afef; } /* Property - Blue */
      .str { fill: #98c379; } /* String - Green */
      .num { fill: #d19a66; } /* Number/Boolean - Orange */
      .punc { fill: #abb2bf; } /* Punctuation - Gray */
      .comment { fill: #5c6370; font-style: italic; } /* Comment - Dark Gray */
    </style>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" /> <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="ambientBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="100" />
    </filter>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="25" stdDeviation="25" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <circle cx="900" cy="150" r="300" fill="#60a5fa" opacity="0.15" filter="url(#ambientBlur)" />
  <circle cx="300" cy="500" r="250" fill="#a855f7" opacity="0.15" filter="url(#ambientBlur)" />

  <g transform="translate(80, 200)">
    
    <g transform="translate(0, -50)">
      <rect x="0" y="0" width="180" height="36" rx="18" fill="#1f2937" stroke="#374151" stroke-width="1" />
      <circle cx="20" cy="18" r="5" fill="#10b981" filter="url(#glow)"/>
      <text x="35" y="23" class="text-badge" fill="#9ca3af">BANDUNG, ID</text>
    </g>

    <text x="0" y="40" class="text-title">Hi, I'm</text>
    <text x="0" y="125" class="text-title" fill="url(#nameGradient)">Mahardika<tspan fill="#ffffff">.</tspan></text>
    
    <text x="0" y="190" class="text-subtitle">Full-Stack Developer</text>
    <text x="0" y="230" class="text-subtitle" style="font-size: 20px;">Building scalable systems &amp; web apps.</text>
  </g>

  <g transform="translate(560, 80)" filter="url(#shadow)">
    <rect width="580" height="470" rx="16" fill="#1e222a" stroke="#3e4451" stroke-width="2" />
    
    <g transform="translate(20, 20)">
      <circle cx="0" cy="0" r="6" fill="#ff5f56" />
      <circle cx="20" cy="0" r="6" fill="#ffbd2e" />
      <circle cx="40" cy="0" r="6" fill="#27c93f" />
      <text x="240" y="4" class="code-font punc" style="font-size: 14px;">developer.ts</text>
    </g>

    <path d="M 0 45 L 580 45" stroke="#3e4451" stroke-width="2" />

    <g transform="translate(20, 85)" class="code-font">
      <text x="0" y="0"><tspan class="kw">const</tspan> <tspan class="var">mahardika</tspan> <tspan class="punc">=</tspan> <tspan class="punc">{</tspan></text>
      
      <text x="20" y="30"><tspan class="prop">role</tspan><tspan class="punc">:</tspan> <tspan class="str">"Software Engineer"</tspan><tspan class="punc">,</tspan></text>
      
      <text x="20" y="60"><tspan class="prop">location</tspan><tspan class="punc">:</tspan> <tspan class="str">"Bandung, Indonesia"</tspan><tspan class="punc">,</tspan></text>
      
      <text x="20" y="90"><tspan class="prop">currentlyBuilding</tspan><tspan class="punc">:</tspan> <tspan class="str">"ensiklotari.id"</tspan><tspan class="punc">,</tspan></text>
      
      <text x="20" y="130"><tspan class="comment">// --- Tech Stack Arsenal ---</tspan></text>

      <text x="20" y="160"><tspan class="prop">techStack</tspan><tspan class="punc">:</tspan> <tspan class="punc">{</tspan></text>
      
      <text x="40" y="190"><tspan class="prop">frontend</tspan><tspan class="punc">:</tspan> <tspan class="punc">[</tspan><tspan class="str">"React"</tspan><tspan class="punc">, </tspan><tspan class="str">"Vue"</tspan><tspan class="punc">, </tspan><tspan class="str">"Next.js"</tspan><tspan class="punc">, </tspan><tspan class="str">"Flutter"</tspan><tspan class="punc">],</tspan></text>
      
      <text x="40" y="220"><tspan class="prop">backend</tspan><tspan class="punc">:</tspan> <tspan class="punc">[</tspan><tspan class="str">"Node.js"</tspan><tspan class="punc">, </tspan><tspan class="str">"Golang"</tspan><tspan class="punc">, </tspan><tspan class="str">"Laravel"</tspan><tspan class="punc">, </tspan><tspan class="str">"NestJS"</tspan><tspan class="punc">],</tspan></text>
      
      <text x="40" y="250"><tspan class="prop">database</tspan><tspan class="punc">:</tspan> <tspan class="punc">[</tspan><tspan class="str">"PostgreSQL"</tspan><tspan class="punc">, </tspan><tspan class="str">"MySQL"</tspan><tspan class="punc">, </tspan><tspan class="str">"MongoDB"</tspan><tspan class="punc">]</tspan></text>

      <text x="20" y="280"><tspan class="punc">},</tspan></text>
      
      <text x="20" y="320"><tspan class="prop">hireable</tspan><tspan class="punc">:</tspan> <tspan class="num">true</tspan><tspan class="punc">,</tspan></text>

      <text x="20" y="350"><tspan class="prop">passion</tspan><tspan class="punc">:</tspan> <tspan class="str">"Crafting elegant solutions for complex problems"</tspan></text>

      <text x="0" y="380"><tspan class="punc">};</tspan></text>

    </g>
  </g>
</svg>
